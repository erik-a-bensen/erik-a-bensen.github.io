bio: |
  Erik Bensen is a PhD student in Statistics and Data Science and a member of the Statistical Methods for the Physical Sciences (STAMPS) Research Center at Carnegie Mellon University. His research interests primarily involve developing statistical methods for complex datasets that arise in the physical sciences, with recent work developing simulation-based inference methods to address systematic misspecifications in aerosol simulations.

